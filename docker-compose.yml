name: polyodds

services:
  postgres:
    image: postgres:16-alpine
    container_name: polyodds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polyodds}
      POSTGRES_USER: ${POSTGRES_USER:-polyodds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-polyodds} -d ${POSTGRES_DB:-polyodds}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: polyodds-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-polyodds}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-polyodds}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set and at least 32 characters}
      BIND_ADDR: 0.0.0.0:3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      RUST_LOG: ${RUST_LOG:-backend=info,tower_http=info}
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: polyodds-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  pgdata:
